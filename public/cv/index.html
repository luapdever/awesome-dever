  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paul Mededji Zannou — CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
     CV — Paul Mededji Zannou
     Palette : primary #110068 · accent #ffa500 · neutres gris
     Police  : Inter
     DYNAMIQUE :
       - Switcher LANGUE (droite)   : FR / EN
       - Switcher PROFIL (gauche)   : Full-Stack / Frontend / Backend / DevOps
       Chaque combinaison langue×profil est rendue à la volée et exportable.
     ÉDITION : tout le contenu vit dans l'objet `T` (langues) et `VARIANTS`
       (profils) dans le <script> en bas.
     ============================================================ */

    :root {
      --primary: #110068;
      --primary-2: #1c1088;
      --accent: #ffa500;
      --accent-deep: #b56f00;
      --ink: #20242e;
      --muted: #666d7e;
      --faint: #9aa0b3;
      --line: #e7e9f1;
      --bg: #e8eaf2;
      --chip-bg: #eef0fa;
      --chip-ink: #2a2280;
      --side-text: #ecedfb;
      --side-muted: #c2c5e6;
      --sidebar-w: 322px;
      --page-w: 794px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: "Inter", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 12.5px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      position: relative;
      width: var(--page-w);
      min-height: 1123px;
      margin: 28px auto;
      background: #fff;
      box-shadow: 0 10px 44px rgba(17, 0, 104, .16);
      overflow: hidden;
    }

    /* ================= SIDEBAR ================= */
    .sidebar {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--sidebar-w);
      background: var(--primary);
      color: var(--side-text);
      padding: 36px 28px 40px;
    }

    .avatar {
      width: 146px;
      height: 146px;
      margin: 0 auto 28px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, .28);
      background: var(--primary-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 44px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      overflow: hidden;
      box-shadow: 0 0 0 6px rgba(255, 255, 255, .06);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .side-block {
      margin-bottom: 26px;
    }

    .side-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.2px;
      text-transform: uppercase;
      color: #fff;
      padding-bottom: 7px;
      margin-bottom: 13px;
      position: relative;
      display: block;
    }

    .side-title::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 34px;
      height: 2.5px;
      background: var(--accent);
    }

    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 11px;
      margin-bottom: 11px;
      font-size: 12px;
      word-break: break-word;
    }

    .contact-item .ic {
      flex: 0 0 16px;
      color: var(--side-muted);
      margin-top: 1px;
    }

    .contact-item .ic svg {
      width: 15px;
      height: 15px;
      display: block;
    }

    .contact-item a {
      color: var(--side-text);
      text-decoration: none;
    }

    .contact-item a:hover {
      color: var(--accent);
    }

    .edu-item {
      margin-bottom: 14px;
    }

    .edu-period {
      color: var(--accent);
      font-weight: 700;
      font-size: 11.5px;
      letter-spacing: .3px;
    }

    .edu-school {
      font-weight: 700;
      font-size: 12.5px;
      margin: 2px 0 3px;
      color: #fff;
    }

    .edu-detail {
      font-size: 11.5px;
      color: var(--side-muted);
    }

    ul.side-ul {
      list-style: none;
    }

    ul.side-ul li {
      position: relative;
      padding-left: 15px;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--side-text);
    }

    ul.side-ul li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 7px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--side-muted);
    }

    .lang-row {
      margin-bottom: 10px;
    }

    .lang-row .lr-top {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .lang-row .lr-top b {
      font-weight: 600;
    }

    .lang-row .lr-top span {
      color: var(--side-muted);
    }

    .bar-track {
      height: 4px;
      background: rgba(255, 255, 255, .14);
      border-radius: 3px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
    }

    /* ================= MAIN ================= */
    .main {
      margin-left: var(--sidebar-w);
      padding: 40px 42px 46px;
    }

    .name {
      font-size: 31px;
      font-weight: 400;
      letter-spacing: .5px;
      color: var(--primary);
      line-height: 1.08;
    }

    .name b {
      font-weight: 800;
    }

    .name-rule {
      height: 3px;
      width: 66px;
      background: var(--accent);
      margin: 14px 0 8px;
      border-radius: 2px;
    }

    .role {
      font-size: 14.5px;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 600;
    }

    .role-sub {
      font-size: 11.5px;
      letter-spacing: 1.6px;
      color: var(--faint);
      font-weight: 600;
      margin-top: 5px;
      text-transform: uppercase;
    }

    .section {
      margin-top: 25px;
    }

    .sec-head {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 14px;
    }

    .sec-head .tab {
      flex: 0 0 auto;
      width: 5px;
      height: 17px;
      background: var(--accent);
      border-radius: 2px;
    }

    .sec-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--primary);
      white-space: nowrap;
    }

    .sec-head .bar {
      flex: 1;
      height: 1.5px;
      background: var(--line);
    }

    .profile-text {
      color: var(--ink);
      text-align: justify;
      font-size: 12.5px;
    }

    .profile-text b {
      color: var(--primary);
      font-weight: 700;
    }

    .xp {
      position: relative;
      padding-left: 24px;
      margin-bottom: 18px;
    }

    .xp::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 4px;
      bottom: -10px;
      width: 2px;
      background: var(--line);
    }

    .xp:last-child::before {
      bottom: 0;
    }

    .xp .dot {
      position: absolute;
      left: 0;
      top: 4px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fff;
      border: 2.5px solid var(--primary);
    }

    .xp-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .xp-role {
      font-weight: 800;
      color: var(--primary);
      font-size: 13.5px;
    }

    .xp-period {
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 600;
      white-space: nowrap;
    }

    .xp-org {
      color: var(--accent-deep);
      font-weight: 700;
      font-size: 12px;
      margin: 1px 0 2px;
    }

    .xp-note {
      color: var(--faint);
      font-size: 11px;
      font-style: italic;
      margin-bottom: 7px;
    }

    .xp ul {
      list-style: none;
      margin-top: 6px;
    }

    .xp ul li {
      position: relative;
      padding-left: 15px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .xp ul li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 6px;
      width: 5px;
      height: 5px;
      border-radius: 1px;
      background: var(--accent);
    }

    .xp ul li b {
      color: var(--primary);
      font-weight: 700;
    }

    .skills-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 28px;
    }

    .skill-cat {
      margin-bottom: 6px;
      font-size: 12px;
    }

    .skill-cat b {
      color: var(--primary);
      font-weight: 700;
    }

    .skill-cat span {
      color: var(--muted);
    }

    .skill-cat.hi {
      border-left: 2px solid var(--accent);
      padding-left: 8px;
      margin-left: -10px;
    }

    .skill-cat.hi b {
      color: var(--accent-deep);
    }

    .soft-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 28px;
      list-style: none;
    }

    .soft-grid li {
      position: relative;
      padding-left: 15px;
      font-size: 12px;
    }

    .soft-grid li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 5px;
      width: 6px;
      height: 6px;
      border-radius: 2px;
      background: var(--accent);
    }

    .soft-grid li b {
      color: var(--primary);
      font-weight: 700;
    }

    .proj {
      border: 1px solid var(--line);
      border-left: 3px solid var(--primary);
      border-radius: 6px;
      padding: 12px 14px;
      margin-bottom: 11px;
      background: #fcfcfe;
    }

    .proj-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .proj-name {
      font-weight: 800;
      color: var(--primary);
      font-size: 13px;
    }

    .proj-year {
      font-size: 11px;
      color: #fff;
      background: var(--primary);
      border-radius: 20px;
      padding: 2px 11px;
      font-weight: 700;
      white-space: nowrap;
      letter-spacing: .3px;
    }

    .proj-meta {
      font-size: 11px;
      margin: 3px 0 5px;
    }

    .proj-role {
      color: var(--accent-deep);
      font-weight: 700;
    }

    .proj-client {
      color: var(--muted);
    }

    .proj-client b {
      color: var(--ink);
      font-weight: 600;
    }

    .proj-desc {
      font-size: 11.8px;
      color: var(--ink);
    }

    .proj-stack {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }

    .chip {
      font-size: 10px;
      background: var(--chip-bg);
      color: var(--chip-ink);
      border-radius: 4px;
      padding: 2px 7px;
      font-weight: 600;
    }

    .proj-links {
      margin-top: 7px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
    }

    .proj-links a {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--primary-2);
      text-decoration: none;
      font-weight: 600;
    }

    .proj-links a:hover {
      color: var(--accent-deep);
    }

    .proj-links a svg {
      width: 12px;
      height: 12px;
    }

    .proj-private {
      font-size: 10.5px;
      color: var(--faint);
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .proj-private svg {
      width: 12px;
      height: 12px;
    }

    /* Confidential project: blurred on screen, removed from the PDF export */
    .proj-confidential {
      position: relative;
      border-left-color: var(--faint);
    }

    .proj-blur {
      filter: blur(4px);
      opacity: .55;
      user-select: none;
      pointer-events: none;
    }

    .proj-nda {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 10.5px;
      font-weight: 700;
      color: var(--accent-deep);
    }

    .proj-nda svg {
      width: 12px;
      height: 12px;
    }

    /* ---------- Controls (switchers + export) ---------- */
    .switch {
      position: fixed;
      z-index: 60;
      background: #fff;
      padding: 7px;
      border-radius: 12px;
      box-shadow: 0 6px 22px rgba(17, 0, 104, .18);
      display: flex;
      gap: 6px;
    }

    .switch .sw-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--faint);
      padding: 3px 5px;
      align-self: center;
    }

    .switch button {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      font-size: 12px;
      padding: 8px 13px;
      border-radius: 8px;
      background: #f0f1f8;
      color: var(--primary);
      transition: background .12s, color .12s, transform .1s;
      white-space: nowrap;
    }

    .switch button:hover {
      background: var(--chip-bg);
    }

    .switch button:active {
      transform: scale(.97);
    }

    .switch-variant {
      top: 22px;
      left: 22px;
      flex-direction: column;
      align-items: stretch;
      width: 150px;
    }

    .switch-variant .sw-label {
      text-align: center;
      padding-bottom: 5px;
    }

    .switch-variant button.active {
      background: var(--accent);
      color: #3a2500;
    }

    .switch-lang {
      top: 22px;
      right: 22px;
      align-items: center;
    }

    .switch-lang button.active {
      background: var(--primary);
      color: #fff;
    }

    .toolbar {
      position: fixed;
      top: 74px;
      right: 22px;
      z-index: 60;
    }

    /* Retour au portfolio — pilule flottante attrayante (bas-gauche) */
    .home-pill {
      position: fixed;
      bottom: 22px;
      left: 22px;
      z-index: 70;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 18px;
      border-radius: 9px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .2px;
      color: #2a1500;
      text-decoration: none;
      background: linear-gradient(135deg, #ffc25c, #ffa500);
      box-shadow: 0 10px 26px rgba(255, 165, 0, .38), 0 2px 6px rgba(17, 0, 104, .18);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .home-pill:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(255, 165, 0, .5), 0 3px 8px rgba(17, 0, 104, .2);
    }

    .home-pill svg {
      width: 16px;
      height: 16px;
    }

    @media print {
      .home-pill {
        display: none !important;
      }
    }

    .btn {
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .4px;
      padding: 11px 18px;
      border-radius: 9px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--accent);
      color: #3a2500;
      box-shadow: 0 6px 20px rgba(255, 165, 0, .4);
      transition: transform .1s ease, filter .15s ease;
    }

    .btn svg {
      width: 17px;
      height: 17px;
    }

    .btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    /* ================= PRINT =================
     Bande latérale indigo peinte via un dégradé sur <html> : Chrome le
     répète fidèlement sur chaque page (contrairement à position:fixed). */
    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      html {
        background: linear-gradient(to right, #110068 0, #110068 322px, #fff 322px, #fff 100%) !important;
        font-size: 10.1px;
      }

      body {
        background: transparent;
      }

      .switch,
      .toolbar,
      iframe[title="PaulBot"],
      iframe[aria-label="PaulBot"] {
        display: none !important;
      }

      .page {
        width: auto;
        min-height: 0;
        margin: 0;
        box-shadow: none;
        overflow: visible;
        background: transparent;
      }

      .sidebar {
        position: absolute;
        top: 0;
        left: 0;
        bottom: auto;
        height: auto;
        width: var(--sidebar-w);
        background: transparent;
        padding: 26px 26px 22px;
      }

      .main {
        margin-left: var(--sidebar-w);
        padding: 26px 30px 22px;
        background: transparent;
      }

      .section {
        margin-top: 13px;
      }

      .xp {
        margin-bottom: 10px;
      }

      .proj {
        margin-bottom: 7px;
        padding: 10px 12px;
      }

      .avatar {
        margin-bottom: 18px;
        width: 128px;
        height: 128px;
      }

      .side-block {
        margin-bottom: 16px;
      }

      .profile-text {
        font-size: 11px;
      }

      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      .xp,
      .proj,
      .edu-item {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      /* Confidential projects are excluded from the exported PDF */
      .proj-confidential {
        display: none !important;
      }

      .sec-head {
        break-after: avoid;
      }

      a {
        color: inherit;
      }
    }

    @media screen and (max-width: 980px) {
      .switch-variant {
        width: auto;
        flex-direction: row;
      }

      .switch-variant .sw-label {
        display: none;
      }
    }

    @media screen and (max-width: 840px) {

      /* Actions regroupées en une barre fixe propre en haut (fini les 3 blocs
         flottants qui se chevauchaient) : profils scrollables sur une ligne,
         langue + export sur la suivante. */
      .controls {
        position: fixed;
        inset: 0 0 auto 0;
        z-index: 70;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: rgba(255, 255, 255, .96);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow: 0 4px 16px rgba(17, 0, 104, .12);
      }

      .switch-variant,
      .switch-lang,
      .toolbar {
        position: static;
        top: auto;
        left: auto;
        right: auto;
        width: auto;
        padding: 0;
        background: transparent;
        box-shadow: none;
      }

      .switch-variant {
        flex: 1 1 100%;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      .switch-variant::-webkit-scrollbar {
        display: none;
      }

      .switch-variant button {
        flex: 0 0 auto;
      }

      .toolbar {
        margin-left: auto;
      }

      .switch button {
        font-size: 12.5px;
        padding: 8px 12px;
      }

      .page {
        width: 100%;
        margin: 96px 0 0;
        box-shadow: none;
      }

      .sidebar {
        position: static;
        width: 100%;
        bottom: auto;
      }

      .main {
        margin-left: 0;
      }

      .skills-grid,
      .soft-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T8C9B5P9" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <!-- Contrôles : fixes aux coins sur desktop, regroupés en barre en haut sur mobile -->
  <div class="controls">
    <!-- Switcher PROFIL (gauche) -->

    const VARIANT_KEYS = ["fullstack", "frontend", "backend", "devops"];
    const VARIANT_LABEL = { fullstack: "Full-Stack", frontend: "Frontend", backend: "Backend", devops: "DevOps" };

    const VARIANTS = {
      fullstack: {
        projectOrder: ["celtiis", "mtn-sites", "mymtn", "emilia", "paulbot", "portfolio", "invoicepay"],
        skillOrder: ["languages", "backend", "ai", "frontend", "mobile", "cms", "db", "devops", "cloud", "obs", "vcs"],
        focus: [],
        fr: {
          role: "Ingénieur Logiciel Full-Stack", roleSub: "Web · Mobile · Realtime · DevOps",
          profile: "Ingénieur logiciel full-stack avec plus de 5 ans d'expérience dans la conception d'applications web, mobiles et realtime à fort trafic. J'architecture des plateformes de bout en bout, du backend distribué (NestJS, Node.js, PostgreSQL, WebSocket) aux interfaces réactives (Vue.js, Flutter), jusqu'au déploiement conteneurisé et aux pipelines CI/CD. Expertise reconnue en systèmes de paiement, streaming vidéo realtime, e-facturation gouvernementale, contrôle d'accès (RBAC/SSO) et écosystèmes WordPress d'entreprise multilingues."
        },
        en: {
          role: "Full-Stack Software Engineer", roleSub: "Web · Mobile · Realtime · DevOps",
          profile: "Full-stack software engineer with 5+ years of experience designing high-traffic web, mobile and real-time applications. I architect end-to-end platforms, from distributed backends (NestJS, Node.js, PostgreSQL, WebSocket) to reactive interfaces (Vue.js, Flutter), through to containerized deployment and CI/CD pipelines. Proven expertise in payment systems, real-time video streaming, government e-invoicing, access control (RBAC/SSO) and multilingual enterprise WordPress ecosystems."
        }
      },
      frontend: {
        projectOrder: ["portfolio", "mymtn", "mtn-sites", "celtiis", "emilia", "paulbot", "invoicepay"],
        skillOrder: ["frontend", "languages", "mobile", "cms", "backend", "ai", "cloud", "devops", "db", "obs", "vcs"],
        focus: ["frontend", "mobile", "languages", "cms"],
        fr: {
          role: "Ingénieur Frontend", roleSub: "Web · Mobile · UI/UX · SPA",
          profile: "Ingénieur frontend spécialisé dans la création d'interfaces web et mobiles réactives, performantes et accessibles. J'excelle avec Vue.js/Nuxt.js et Flutter, l'intégration d'APIs RESTful, la gestion d'état avancée et l'optimisation du rendu. Fort d'une expérience sur des applications grand public à fort trafic (Selfcare télécom, plateformes sociales), je conçois des composants réutilisables et des expériences utilisateur soignées, du prototype à la production."
        },
        en: {
          role: "Frontend Engineer", roleSub: "Web · Mobile · UI/UX · SPA",
          profile: "Frontend engineer specialized in building reactive, performant and accessible web and mobile interfaces. I excel with Vue.js/Nuxt.js and Flutter, RESTful API integration, advanced state management and rendering optimization. With experience on high-traffic consumer apps (telecom Selfcare, social platforms), I craft reusable components and polished user experiences, from prototype to production."
        }
      },
      backend: {
        projectOrder: ["emilia", "paulbot", "portfolio", "invoicepay", "celtiis", "mtn-sites", "mymtn"],
        skillOrder: ["backend", "ai", "languages", "db", "cloud", "devops", "obs", "frontend", "cms", "mobile", "vcs"],
        focus: ["backend", "ai", "db", "cloud"],
        fr: {
          role: "Ingénieur Backend", roleSub: "APIs · Realtime · Paiements · Data",
          profile: "Ingénieur backend expert en conception d'APIs robustes et de systèmes distribués à fort trafic. Je maîtrise NestJS, Node.js et Express, les architectures multi-services et realtime (WebSocket, Agora), les systèmes de paiement (Stripe), la sécurité (RBAC, SSO, 2FA) et les bases de données relationnelles (PostgreSQL, MySQL). J'ai livré des plateformes critiques : un site de rencontre en visio (streaming vidéo, paiements) et de l'e-facturation pour le secteur public."
        },
        en: {
          role: "Backend Engineer", roleSub: "APIs · Real-Time · Payments · Data",
          profile: "Backend engineer expert in designing robust APIs and distributed systems for high traffic. I master NestJS, Node.js and Express, multi-service and real-time architectures (WebSocket, Agora), payment systems (Stripe), security (RBAC, SSO, 2FA) and relational databases (PostgreSQL, MySQL). I have delivered mission-critical platforms: a live-video dating site (video streaming, payments) and public-sector e-invoicing."
        }
      },
      devops: {
        projectOrder: ["emilia", "celtiis", "invoicepay", "paulbot", "portfolio", "mtn-sites", "mymtn"],
        skillOrder: ["devops", "cloud", "obs", "backend", "ai", "db", "vcs", "languages", "cms", "frontend", "mobile"],
        focus: ["devops", "cloud", "obs", "backend"],
        fr: {
          role: "Ingénieur DevOps", roleSub: "Docker · CI/CD · Cloud · Observabilité",
          profile: "Ingénieur orienté DevOps, je conçois et automatise des chaînes de déploiement conteneurisées fiables. J'ai mis en place des pipelines CI/CD (GitLab CI, Jenkins), des architectures Docker/Docker Compose multi-services, des reverse proxies Nginx avec SSL/TLS, du SSO Keycloak, ainsi que de la supervision (Prometheus, Grafana, Uptime Kuma) et des sauvegardes automatisées. J'assure la scalabilité, la sécurité et la disponibilité d'applications en production."
        },
        en: {
          role: "DevOps Engineer", roleSub: "Docker · CI/CD · Cloud · Observability",
          profile: "DevOps-oriented engineer building and automating reliable containerized delivery pipelines. I have set up CI/CD pipelines (GitLab CI, Jenkins), multi-service Docker/Docker Compose architectures, Nginx reverse proxies with SSL/TLS, Keycloak SSO, plus monitoring (Prometheus, Grafana, Uptime Kuma) and automated backups. I ensure the scalability, security and availability of production applications."
        }
      }
    };

    /* ================= ÉTAT =================
       Priorité : paramètres d'URL (?lang=en&profile=backend) puis localStorage.
       Ainsi chaque version est partageable et imprimable directement. */
    const _qs = new URLSearchParams(location.search);
    const state = {
      lang: _qs.get("lang") || localStorage.getItem("cv_lang") || "fr",
      variant: _qs.get("profile") || localStorage.getItem("cv_variant") || "fullstack"
    };
    if (!T[state.lang]) state.lang = "fr";
    if (!VARIANTS[state.variant]) state.variant = "fullstack";

    /* ================= RENDU ================= */
    function byField(arr, field) { const m = {}; arr.forEach(x => m[x[field]] = x); return m; }

    function render() {
      const lang = state.lang, variant = state.variant;
      const base = T[lang];
      const ui = base.ui;
      const v = VARIANTS[variant][lang];
      const conf = VARIANTS[variant];

      document.documentElement.lang = lang;
      document.title = `CV ${IDENTITY.firstName} ${IDENTITY.lastName} - ${v.role} (${lang.toUpperCase()})`;

      const avatar = IDENTITY.photo ? `<img src="${IDENTITY.photo}" alt="Photo">` : IDENTITY.initials;

      const contact = base.contact.map(c => {
        const inner = c.href ? `<a href="${c.href}">${c.text}</a>` : `<span>${c.text}</span>`;
        return `<div class="contact-item"><span class="ic">${ICONS[c.icon] || ""}</span>${inner}</div>`;
      }).join("");

      const education = base.education.map(e =>
        `<div class="edu-item"><div class="edu-period">${e.period}</div><div class="edu-school">${e.school}</div><div class="edu-detail">${e.detail}</div></div>`).join("");

      const certs = `<ul class="side-ul">${base.certificates.map(c => `<li>${c}</li>`).join("")}</ul>`;
      const langs = base.languages.map(l =>
        `<div class="lang-row"><div class="lr-top"><b>${l.name}</b><span>${l.level}</span></div><div class="bar-track"><div class="bar-fill" style="width:${l.pct}%"></div></div></div>`).join("");
      const interests = `<ul class="side-ul">${base.interests.map(i => `<li>${i}</li>`).join("")}</ul>`;

      const experiences = base.experiences.map(x =>
        `<div class="xp"><span class="dot"></span>
       <div class="xp-head"><span class="xp-role">${x.role}</span><span class="xp-period">${x.period}</span></div>
       <div class="xp-org">${x.org}</div>${x.note ? `<div class="xp-note">${x.note}</div>` : ""}
       <ul>${x.bullets.map(b => `<li>${b}</li>`).join("")}</ul></div>`).join("");

      // Projets ordonnés selon le profil
      const projMap = byField(base.projects, "id");
      const projList = conf.projectOrder.map(id => projMap[id]).filter(Boolean);
      const projects = projList.map(p => {
        // Projets sous NDA : mention sobre (entreprise + type de projet), sans
        // nom ni détails, sans flou ni cadenas — pour ne pas surcharger le CV.
        if (p.hidden) {
          return `<div class="proj">
       <div class="proj-head"><span class="proj-name">${p.type || ui.confidential}</span><span class="proj-year">${p.year}</span></div>
       <div class="proj-meta"><span class="proj-client">${ui.client}&nbsp;: <b>${p.company || ""}</b></span></div></div>`;
        }
        const links = (p.links && p.links.length)
          ? p.links.map(l => `<a href="${l.href}" target="_blank" rel="noopener">${ICONS.link}${l.label}</a>`).join("") : "";
        const priv = p.private ? `<span class="proj-private">${ICONS.lock} ${ui.privateProj}</span>` : "";
        return `<div class="proj">
       <div class="proj-head"><span class="proj-name">${p.name}</span><span class="proj-year">${p.year}</span></div>
       <div class="proj-meta"><span class="proj-role">${p.role}</span> &nbsp;·&nbsp; <span class="proj-client">${ui.client}&nbsp;: <b>${p.client}</b></span></div>
       <div class="proj-desc">${p.desc}</div>
       <div class="proj-stack">${p.stack.map(s => `<span class="chip">${s}</span>`).join("")}</div>
       ${(links || priv) ? `<div class="proj-links">${links}${priv}</div>` : ""}</div>`;
      }).join("");

      // Compétences ordonnées + mises en avant selon le profil
      const skillMap = byField(base.skills, "key");
      const skillList = conf.skillOrder.map(k => skillMap[k]).filter(Boolean);
      const focus = new Set(conf.focus || []);
      const skills = skillList.map(s =>
        `<div class="skill-cat${focus.has(s.key) ? " hi" : ""}"><b>${s.cat} :</b> <span>${s.items}</span></div>`).join("");

      const soft = `<ul class="soft-grid">${base.softSkills.map(s => `<li><b>${s.title} :</b> ${s.desc}</li>`).join("")}</ul>`;

      document.getElementById("cv").innerHTML = `
    <aside class="sidebar">
      <div class="avatar">${avatar}</div>
      <div class="side-block"><span class="side-title">${ui.contact}</span>${contact}</div>
      <div class="side-block"><span class="side-title">${ui.formation}</span>${education}</div>
      <div class="side-block"><span class="side-title">${ui.certs}</span>${certs}</div>
      <div class="side-block"><span class="side-title">${ui.langues}</span>${langs}</div>
      <div class="side-block"><span class="side-title">${ui.interets}</span>${interests}</div>
    </aside>
    <main class="main">
      <header>
        <div class="name">${IDENTITY.firstName} <b>${IDENTITY.lastName}</b></div>
        <div class="name-rule"></div>
        <div class="role">${v.role}</div>
        <div class="role-sub">${v.roleSub}</div>
      </header>
      <section class="section"><div class="sec-head"><span class="tab"></span><span class="sec-title">${ui.profil}</span><span class="bar"></span></div><p class="profile-text">${v.profile}</p></section>
      <section class="section"><div class="sec-head"><span class="tab"></span><span class="sec-title">${ui.exp}</span><span class="bar"></span></div>${experiences}</section>
      <section class="section"><div class="sec-head"><span class="tab"></span><span class="sec-title">${ui.projets}</span><span class="bar"></span></div>${projects}</section>
      <section class="section"><div class="sec-head"><span class="tab"></span><span class="sec-title">${ui.tech}</span><span class="bar"></span></div><div class="skills-grid">${skills}</div></section>
      <section class="section"><div class="sec-head"><span class="tab"></span><span class="sec-title">${ui.soft}</span><span class="bar"></span></div>${soft}</section>
    </main>`;

      renderControls();
    }

    /* ================= SWITCHERS ================= */
    function renderControls() {
      const ui = T[state.lang].ui;

      // Switcher profil (gauche)
      const vs = document.getElementById("variantSwitch");
      vs.innerHTML = `<span class="sw-label">${ui.profilLabel}</span>` +
        VARIANT_KEYS.map(k =>
          `<button data-variant="${k}" class="${k === state.variant ? "active" : ""}">${VARIANT_LABEL[k]}</button>`).join("");
      vs.querySelectorAll("button").forEach(b =>
        b.onclick = () => { state.variant = b.dataset.variant; localStorage.setItem("cv_variant", state.variant); render(); });

      // Switcher langue (droite)
      const ls = document.getElementById("langSwitch");
      ls.innerHTML = `<span class="sw-label">${ui.langLabel}</span>` +
        ["fr", "en"].map(l =>
          `<button data-lang="${l}" class="${l === state.lang ? "active" : ""}">${l.toUpperCase()}</button>`).join("");
      ls.querySelectorAll("button").forEach(b =>
        b.onclick = () => { state.lang = b.dataset.lang; localStorage.setItem("cv_lang", state.lang); render(); });

      // Bouton export
      document.getElementById("pdfBtn").innerHTML = ICONS.download + " " + ui.exportPdf;
      document.getElementById("homeBtn").innerHTML = ICONS.home + " " + ui.home;
    }

    render();
  </script>

  <!-- Widget PaulBot embarqué (iframe vers le vrai composant React, sans duplication) -->
  <script src="/paulbot-widget.js" defer></script>

  <!-- Bannière de consentement (sobre) — partage la clé cookie_consent avec le site -->
  <div id="cookieBar"
    style="display:none;position:fixed;bottom:20px;left:20px;z-index:9998;max-width:420px;display:none;align-items:center;gap:14px;padding:12px 14px;border-radius:12px;background:rgba(17,0,104,.92);color:#f2edff;border:1px solid rgba(255,255,255,.14);box-shadow:0 10px 30px rgba(0,0,0,.35);font-size:13px;line-height:1.45;font-family:system-ui,-apple-system,'Segoe UI',sans-serif">
    <p id="cookieTxt" style="margin:0;flex:1"></p>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button id="cookieNo"
        style="font:inherit;font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;background:transparent;color:#cfc6ee;border:1px solid rgba(255,255,255,.22)"></button>
      <button id="cookieYes"
        style="font:inherit;font-size:12.5px;font-weight:600;padding:7px 14px;border-radius:8px;cursor:pointer;background:#ffa500;color:#1a0a00;border:1px solid transparent"></button>
    </div>
  </div>
  <script>
    (function () {
      var fr = !/^en/i.test(navigator.language || 'fr');
      var t = fr
        ? { txt: "Ce site utilise des cookies de mesure d'audience pour améliorer l'expérience.", yes: "Accepter", no: "Refuser" }
        : { txt: "This site uses analytics cookies to improve your experience.", yes: "Accept", no: "Decline" };
      var bar = document.getElementById('cookieBar');
      document.getElementById('cookieTxt').textContent = t.txt;
      document.getElementById('cookieYes').textContent = t.yes;
      document.getElementById('cookieNo').textContent = t.no;
      function decide(granted) {
        try { localStorage.setItem('cookie_consent', granted ? 'granted' : 'denied'); } catch (e) { }
        try { if (typeof gtag === 'function') { var v = granted ? 'granted' : 'denied'; gtag('consent', 'update', { ad_storage: v, ad_user_data: v, ad_personalization: v, analytics_storage: v }); } } catch (e) { }
        bar.style.display = 'none';
      }
      document.getElementById('cookieYes').onclick = function () { decide(true); };
      document.getElementById('cookieNo').onclick = function () { decide(false); };
      try { if (!localStorage.getItem('cookie_consent')) bar.style.display = 'flex'; } catch (e) { bar.style.display = 'flex'; }
    })();
  </script>
</body>
